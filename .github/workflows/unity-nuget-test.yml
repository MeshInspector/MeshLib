name: Test Nuget package with Unity

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test'
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

# `contents: write` is required to see the release: pr-test releases created
# by full-ci PR runs are drafts, and drafts are invisible to a read-only token
# ("release not found" from `gh release download`).
permissions:
  contents: write

# Serialize whole runs; matrix parallelism within a run is unrestricted
# because manual (.ulf) license activation is per-machine, not seat-counted.
concurrency:
  group: unity-test
  cancel-in-progress: false

jobs:
  unity-nuget-test:
    name: Unity test (${{ matrix.os }})
    # Job-level timeout is a safety net (editor download + install alone
    # takes ~10 minutes); the real cap for the editor run is on the
    # "Run test" step below so that a timeout there is reported as a
    # `failure` rather than `cancelled`, letting the results upload execute.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest, macos-15-intel ]
    runs-on: ${{ matrix.os }}
    # Windows is the established release gate; the other platforms exercise
    # the previously untested linux-x64 / osx-arm64 / osx-x64 natives of the
    # package and stay non-blocking until proven stable.
    continue-on-error: ${{ matrix.os != 'windows-latest' }}
    env:
      UNITY_PROJECT: test_unity/NugetTestProj
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The job token has `contents: write`; don't leave it readable in
          # .git/config for later steps.
          persist-credentials: false

      - name: Download nuget package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ inputs.release_tag }} --pattern "*.nupkg" --repo ${{ github.repository }} --clobber

      - name: Put package into local NuGet feed
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Filter "MeshLib*.nupkg" | Select-Object -First 1
          if (!$pkg) {
            Write-Error "No MeshLib*.nupkg file found"
            exit 1
          }
          $matches = $null
          $foundVersion = $pkg.Name -match '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
          if (!$foundVersion) {
            Write-Error "Cannot extract version from MeshLib*.nupkg"
            exit 1
          }
          $pkgVersion = $matches[0]

          $feedDir = Join-Path $env:GITHUB_WORKSPACE "$env:UNITY_PROJECT/nuget_repo"
          New-Item -ItemType Directory -Force -Path $feedDir | Out-Null
          Move-Item $pkg.FullName (Join-Path $feedDir "MeshLib.$pkgVersion.nupkg")

          # NuGetForUnity's resolution base for relative feed paths is not
          # well defined, so point the local package source at the feed
          # folder by absolute path.
          $patched = $false
          foreach ($cfg in Get-ChildItem -Path $env:UNITY_PROJECT -Recurse -Filter "NuGet.config") {
            $xml = [xml](Get-Content -Path $cfg.FullName)
            foreach ($src in $xml.configuration.packageSources.add) {
              if ($src.key -eq 'LocalMeshLib' -or $src.value -match 'nuget_repo') {
                $src.value = "$feedDir"
                $patched = $true
              }
            }
            $xml.Save($cfg.FullName)
          }
          if (!$patched) {
            Write-Error "No NuGet.config with a 'LocalMeshLib' (or *nuget_repo*) package source found under $env:UNITY_PROJECT"
            exit 1
          }

          $xmlPath = Join-Path $env:GITHUB_WORKSPACE "$env:UNITY_PROJECT/Assets/packages.config"
          $xml = [xml](Get-Content -Path $xmlPath)
          $xml.packages.package.version = $pkgVersion
          $xml.Save($xmlPath)

      - name: Install nuget package
        shell: pwsh
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore "$env:UNITY_PROJECT"

      - name: Install Unity editor
        uses: buildalon/unity-setup@30fcbcb56c10ea5d64298e970d952b8d29bc268b # v2.6.0
        with:
          version-file: ${{ env.UNITY_PROJECT }}/ProjectSettings/ProjectVersion.txt

      - name: Activate Unity license
        # Personal license via the official CLI and a manual license file:
        # no Unity account credentials in CI. `-manualLicenseFile` is known
        # to exit non-zero even on success, so the step is not gated on the
        # exit code -- a failed activation surfaces as a licensing error in
        # the test step.
        shell: pwsh
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if (-not $env:UNITY_LICENSE) {
            Write-Error "UNITY_LICENSE secret is not set (expected contents of the .ulf license file)"
            exit 1
          }
          if ($IsMacOS) {
            sudo mkdir -p "/Library/Application Support/Unity"
            sudo chown -R "$env:USER" "/Library/Application Support/Unity"
          }
          $ulf = Join-Path $env:RUNNER_TEMP "Unity_lic.ulf"
          Set-Content -Path $ulf -Value $env:UNITY_LICENSE
          $log = Join-Path $env:RUNNER_TEMP "activation.log"
          Start-Process -FilePath $env:UNITY_EDITOR_PATH -ArgumentList "-batchmode","-nographics","-quit","-manualLicenseFile",$ulf,"-logfile",$log -Wait -NoNewWindow
          Remove-Item $ulf
          Get-Content $log -Tail 20 -ErrorAction SilentlyContinue

      - name: Run test
        # Step-level timeout: when the Unity Editor invocation exceeds this
        # cap, the step ends with `failure` (not `cancelled`) and the log
        # print + results upload below still execute. `-runTests` exit codes:
        # 0 all tests passed, 2 tests failed, 3 run error.
        timeout-minutes: 20
        shell: pwsh
        run: |
          $unityArgs = @(
            "-batchmode", "-nographics",
            "-projectPath", (Join-Path $env:GITHUB_WORKSPACE $env:UNITY_PROJECT),
            "-runTests", "-testPlatform", "playmode",
            "-testResults", (Join-Path $env:GITHUB_WORKSPACE "results.xml"),
            "-logfile", (Join-Path $env:GITHUB_WORKSPACE "unity-test.log")
          )
          $proc = Start-Process -FilePath $env:UNITY_EDITOR_PATH -ArgumentList $unityArgs -Wait -PassThru -NoNewWindow
          Write-Output "Unity exit code: $($proc.ExitCode)"
          exit $proc.ExitCode

      - name: Print editor log
        if: always()
        shell: pwsh
        run: Get-Content unity-test.log -ErrorAction SilentlyContinue

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unity-test-results-${{ matrix.os }}
          path: |
            results.xml
            unity-test.log
          if-no-files-found: ignore
