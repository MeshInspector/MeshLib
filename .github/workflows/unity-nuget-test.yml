name: Test Nuget package with Unity

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test'
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

# pr-test releases are drafts; reading them requires a write token.
permissions:
  contents: write

# Serialize runs; each job activates a personal license and returns it at job end.
concurrency:
  group: unity-test
  cancel-in-progress: false

jobs:
  unity-nuget-test:
    name: Unity test (${{ matrix.os }})
    # Safety net; the editor steps below carry their own tighter timeouts.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest, macos-15-intel ]
    runs-on: ${{ matrix.os }}
    # Windows is the release gate; other legs cover the remaining package
    # natives and stay non-blocking until proven stable.
    continue-on-error: ${{ matrix.os != 'windows-latest' }}
    env:
      UNITY_PROJECT: test_unity/NugetTestProj
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Keep the write token out of .git/config.
          persist-credentials: false

      - name: Download nuget package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ inputs.release_tag }} --pattern "*.nupkg" --repo ${{ github.repository }} --clobber

      - name: Put package into local NuGet feed
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Filter "MeshLib*.nupkg" | Select-Object -First 1
          if (!$pkg) {
            Write-Error "No MeshLib*.nupkg file found"
            exit 1
          }
          $matches = $null
          $foundVersion = $pkg.Name -match '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
          if (!$foundVersion) {
            Write-Error "Cannot extract version from MeshLib*.nupkg"
            exit 1
          }
          $pkgVersion = $matches[0]

          $feedDir = Join-Path $env:GITHUB_WORKSPACE "$env:UNITY_PROJECT/nuget_repo"
          New-Item -ItemType Directory -Force -Path $feedDir | Out-Null
          Move-Item $pkg.FullName (Join-Path $feedDir "MeshLib.$pkgVersion.nupkg")

          # NuGetForUnity resolves relative feed paths inconsistently; use an
          # absolute path.
          $patched = $false
          foreach ($cfg in Get-ChildItem -Path $env:UNITY_PROJECT -Recurse -Filter "NuGet.config") {
            $xml = [xml](Get-Content -Path $cfg.FullName)
            foreach ($src in $xml.configuration.packageSources.add) {
              if ($src.key -eq 'LocalMeshLib' -or $src.value -match 'nuget_repo') {
                $src.value = "$feedDir"
                $patched = $true
              }
            }
            $xml.Save($cfg.FullName)
          }
          if (!$patched) {
            Write-Error "No NuGet.config with a 'LocalMeshLib' (or *nuget_repo*) package source found under $env:UNITY_PROJECT"
            exit 1
          }

          $xmlPath = Join-Path $env:GITHUB_WORKSPACE "$env:UNITY_PROJECT/Assets/packages.config"
          $xml = [xml](Get-Content -Path $xmlPath)
          $xml.packages.package.version = $pkgVersion
          $xml.Save($xmlPath)

      - name: Install Unity editor
        # The one step with a live external dependency (Unity CDN); a hung
        # download should fail fast, not eat the job budget.
        timeout-minutes: 25
        uses: buildalon/unity-setup@30fcbcb56c10ea5d64298e970d952b8d29bc268b # v2.6.0
        with:
          version-file: ${{ env.UNITY_PROJECT }}/ProjectSettings/ProjectVersion.txt

      - name: Activate Unity license
        # The manual .ulf flow no longer offers personal licenses, so drive
        # the licensing client bundled with the editor. The account must have
        # accepted the personal-license terms and must not use 2FA.
        shell: pwsh
        env:
          UNITY_USERNAME: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if (-not $env:UNITY_USERNAME -or -not $env:UNITY_PASSWORD) {
            Write-Error "UNITY_USERNAME / UNITY_PASSWORD secrets are not set"
            exit 1
          }
          if ($IsMacOS) {
            sudo mkdir -p "/Library/Application Support/Unity"
            sudo chown -R "$env:USER" "/Library/Application Support/Unity"
          }
          $clientName = $IsWindows ? "Unity.Licensing.Client.exe" : "Unity.Licensing.Client"
          $editorDir = Split-Path $env:UNITY_EDITOR_PATH
          $client = @(
            (Join-Path $editorDir "Data/Resources/Licensing/Client/$clientName"),
            (Join-Path (Split-Path $editorDir) "Frameworks/UnityLicensingClient_V1.app/Contents/MacOS/$clientName")
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $client) {
            $client = (Get-ChildItem -Path $editorDir, (Split-Path $editorDir) -Recurse -Filter $clientName -File -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $client) {
            Write-Error "Unity.Licensing.Client not found near $env:UNITY_EDITOR_PATH"
            exit 1
          }
          Write-Output "Licensing client: $client"
          "UNITY_LICENSING_CLIENT=$client" >> $env:GITHUB_ENV
          & $client --activate-ulf --username $env:UNITY_USERNAME --password $env:UNITY_PASSWORD --include-personal
          exit $LASTEXITCODE

      - name: Prime Unity project
        # Compile the NuGetForUnity UPM package (and its asset postprocessor)
        # into Library before restoring: natives imported without the
        # postprocessor keep all-platforms-disabled import settings and fail
        # with DllNotFoundException. Exit code ignored -- compile errors are
        # expected while the nuget package is missing.
        timeout-minutes: 15
        shell: pwsh
        run: |
          Start-Process -FilePath $env:UNITY_EDITOR_PATH -ArgumentList "-batchmode","-nographics","-quit","-projectPath",(Join-Path $env:GITHUB_WORKSPACE $env:UNITY_PROJECT),"-logfile",(Join-Path $env:GITHUB_WORKSPACE "unity-prime.log") -Wait -NoNewWindow

      - name: Setup .NET
        # macOS runners have no registered dotnet install; the tool host
        # needs DOTNET_ROOT.
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Install nuget package
        shell: pwsh
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore "$env:UNITY_PROJECT"

      - name: Run test
        # Exit codes: 0 all passed, 2 test failures, 3 run error. The step
        # timeout keeps the printing steps below reachable on a hang.
        timeout-minutes: 20
        shell: pwsh
        run: |
          $unityArgs = @(
            "-batchmode", "-nographics",
            "-projectPath", (Join-Path $env:GITHUB_WORKSPACE $env:UNITY_PROJECT),
            "-runTests", "-testPlatform", "playmode",
            "-testResults", (Join-Path $env:GITHUB_WORKSPACE "results.xml"),
            "-logfile", (Join-Path $env:GITHUB_WORKSPACE "unity-test.log")
          )
          $proc = Start-Process -FilePath $env:UNITY_EDITOR_PATH -ArgumentList $unityArgs -Wait -PassThru -NoNewWindow
          Write-Output "Unity exit code: $($proc.ExitCode)"
          exit $proc.ExitCode

      - name: Print test results
        # Informational; gating is the Run test exit code above.
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path results.xml)) {
            Write-Output "No results.xml produced (the editor failed before running tests); see the editor log below."
            exit 0
          }
          [xml]$r = Get-Content results.xml
          $tr = $r.'test-run'
          Write-Output "Test run result: $($tr.result) (total=$($tr.total) passed=$($tr.passed) failed=$($tr.failed) skipped=$($tr.skipped) duration=$($tr.duration)s)"
          foreach ($tc in $r.SelectNodes("//test-case")) {
            Write-Output "  $($tc.fullname): $($tc.result) ($($tc.duration)s)"
            $testOutput = $tc.output.'#cdata-section'
            if ($testOutput -and $testOutput.Trim()) {
              Write-Output "    console output:"
              $testOutput.Trim() -split "`n" | ForEach-Object { Write-Output "      $_" }
            }
            if ($tc.result -eq "Failed") {
              $msg = $tc.failure.message.'#cdata-section'
              $stack = $tc.failure.'stack-trace'.'#cdata-section'
              if ($msg) { Write-Output "    message: $($msg.Trim())" }
              if ($stack) { Write-Output "    stack: $($stack.Trim())" }
              $oneLine = ("$($tc.fullname): $msg" -replace "\s+", " ").Trim()
              Write-Output "::error title=Unity test failed::$oneLine"
            }
          }

      - name: Print editor log
        if: always()
        shell: pwsh
        run: Get-Content unity-test.log -ErrorAction SilentlyContinue

      - name: Return Unity license
        if: always()
        shell: pwsh
        run: |
          if ($env:UNITY_LICENSING_CLIENT) {
            & $env:UNITY_LICENSING_CLIENT --return-ulf
          }
