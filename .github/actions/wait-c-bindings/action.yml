name: 'Wait for C bindings'
description: >
  Block until the `generate-c-bindings` reusable workflow has finished in
  the current run, then return so the caller's "Download C bindings" step
  can fetch the artifact it produced.

  This lets a build-test job start its early steps (checkout, submodules,
  thirdparty/MRBind install, base compile) in parallel with
  `generate-c-bindings`, instead of gating the whole job on it through
  `needs:`. Only the bindings download has to wait -- effectively the old
  `needs: generate-c-bindings` edge, relocated to step granularity.

  Waiting on the job (rather than polling for the artifact) is enough
  because the job's final step uploads the artifact unconditionally, so it
  cannot conclude "success" without it -- and the completion status is
  strictly after the artifact is finalized, so there is no propagation
  window where the job looks done but the artifact is not yet downloadable.

  Implemented with `actions/github-script` (a JS action) so it runs
  identically inside the Linux build containers and on the Windows/macOS
  hosts, the same way `actions/checkout` / `actions/download-artifact` do.
  It reads the run's jobs via the REST API, so the calling job needs
  `actions: read` on its GITHUB_TOKEN -- and, because a reusable workflow's
  token is capped by its caller, the caller workflow's `permissions:` must
  grant `actions: read` too (see build-test-distribute.yml).

inputs:
  generating-job:
    required: false
    default: generate-c-bindings
    description: >
      Substring matched against the run's job names to find the job that
      produces the artifact. Its successful completion is what we wait for;
      a non-success conclusion aborts the wait instead of timing out.
  timeout-seconds:
    required: false
    default: '1800'
    description: Maximum time to wait before failing (default 30 minutes).
  poll-interval-seconds:
    required: false
    default: '5'
    description: Delay between polls.

runs:
  using: composite
  steps:
    - name: Wait for ${{ inputs.generating-job }} to finish
      uses: actions/github-script@v9
      with:
        script: |
          const generatingJob = ${{ toJSON(inputs.generating-job) }};
          const timeoutMs = Number(${{ toJSON(inputs.timeout-seconds) }}) * 1000;
          const intervalMs = Number(${{ toJSON(inputs.poll-interval-seconds) }}) * 1000;
          const { owner, repo } = context.repo;
          const runId = context.runId;
          const deadline = Date.now() + timeoutMs;
          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

          // Swallow transient API blips (5xx, secondary rate limits) and keep
          // polling; only a real timeout or a failed job stops us.
          const safe = async (fn) => {
            try { return await fn(); }
            catch (err) { core.warning(`Actions API poll failed (will retry): ${err.message}`); return null; }
          };

          core.info(
            `Waiting for job matching "${generatingJob}" to finish in run ${runId} ` +
            `(timeout ${timeoutMs / 1000}s, poll every ${intervalMs / 1000}s).`,
          );

          for (;;) {
            const jobs = await safe(() => github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              { owner, repo, run_id: runId, per_page: 100 },
            ));
            const gen = jobs && jobs.find((j) => j.name.includes(generatingJob));
            if (gen && gen.status === 'completed') {
              if (gen.conclusion === 'success') {
                core.info(`Job "${gen.name}" finished successfully; C bindings are ready.`);
                break;
              }
              throw new Error(
                `Job "${gen.name}" concluded "${gen.conclusion}"; C bindings will not be available.`,
              );
            }

            if (Date.now() >= deadline) {
              throw new Error(
                `Timed out after ${timeoutMs / 1000}s waiting for job "${generatingJob}".`,
              );
            }
            await sleep(intervalMs);
          }
