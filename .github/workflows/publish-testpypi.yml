name: Publish to TestPyPI

# Manual-only: build the full Python wheel matrix from a chosen ref and upload it to
# TestPyPI (https://test.pypi.org). This never touches production PyPI - the production
# upload lives in `pip-build.yml`'s `upload-to-release` job, gated on `release`/`publish`,
# and this path only sets `publish_testpypi`.
#
# Version: reuses the same `X.Y.Z.<commits-since-tag>` scheme as the release pipeline
# (paulhatch/semantic-version, identical settings to `config.yml`), computed at the chosen
# ref, so nightly/dev wheels carry a real, unique, PEP 440-valid version. Re-runs with an
# unchanged version are absorbed by `twine --skip-existing`.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch / tag / SHA) to build. Empty = the branch this workflow runs from."
        default: ""
        required: false
        type: string

permissions:
  contents: read

jobs:
  compute-version:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version-tag.outputs.app_version }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Versioning
        uses: paulhatch/semantic-version@9f72830310d5ed81233b641ee59253644cd8a8fc # v6.0.2
        id: version
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "v${major}.${minor}.${patch}.${increment}"
          bump_each_commit: false
          search_commit_body: true

      - name: Set version tag
        id: version-tag
        run: |
          version=${{ steps.version.outputs.version }}
          echo "app_version=${version%%-*}" >> $GITHUB_OUTPUT

  build-and-publish:
    needs: compute-version
    uses: ./.github/workflows/pip-build.yml
    with:
      vcpkg_docker_image_tag: ""
      ref: ${{ inputs.ref }}
      version: ${{ needs.compute-version.outputs.app_version }}
      publish_testpypi: true
    secrets: inherit
