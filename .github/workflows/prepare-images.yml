name: Prepare images

on:
  workflow_call:
    inputs:
      docker_image_tag:
        required: true
        type: string
      need_linux_image_rebuild:
        required: true
        type: boolean
      need_linux_vcpkg_rebuild:
        required: true
        type: boolean
      need_windows_vcpkg_rebuild:
        required: true
        type: boolean
      vcpkg_docker_image_tag:
        required: true
        type: string
      vs19_vcpkg_version:
        required: true
        type: string
      vs22_vcpkg_version:
        required: true
        type: string

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  always-success:
    runs-on: aws-micro
    steps:
      - name: Do nothing
        run: echo

  linux-image-build-upload:
    if: ${{ inputs.need_linux_image_rebuild }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        distro: [ ubuntu22, ubuntu24, emscripten ]
        arch: [ x64, arm64 ]
        exclude:
          - distro: emscripten
            arch: x64
        include:
          - arch: x64
            image-suffix: ''
            os: ubuntu-latest
          - arch: arm64
            image-suffix: '-arm64'
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    env:
      dockerfile: ${{ matrix.distro }}Dockerfile
      image: meshlib/meshlib-${{ matrix.distro }}${{ matrix.image-suffix }}:${{ inputs.docker_image_tag }}
    steps:
      - name: Work-around possible permission issues
        shell: bash
        run: |
          # NOTE: {GITHUB_WORKSPACE} != {{ github.workspace }}
          # Related issue: https://github.com/actions/runner/issues/2058
          if test -d $GITHUB_WORKSPACE && test -n "$(find ${GITHUB_WORKSPACE} -user root)" ; then
            mv ${GITHUB_WORKSPACE} ${GITHUB_WORKSPACE}_${RANDOM}
            mkdir ${GITHUB_WORKSPACE}
          fi

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

      - name: Work-around possible permission issues
        shell: bash
        run: |
          # NOTE: {GITHUB_WORKSPACE} != {{ github.workspace }}
          # Related issue: https://github.com/actions/runner/issues/2058
          if test -d $GITHUB_WORKSPACE && test -n "$(find ${GITHUB_WORKSPACE} -user root)" ; then
            mv ${GITHUB_WORKSPACE} ${GITHUB_WORKSPACE}_${RANDOM}
            mkdir ${GITHUB_WORKSPACE}
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: meshlib
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Switch from plain `docker build` to BuildKit via buildx so the image
      # can be pushed with zstd-compressed layers (faster to decompress than
      # the default gzip). force-compression=true ensures all layers are
      # re-compressed, including those inherited from the base image;
      # oci-mediatypes=true is required for Docker Hub to accept zstd layers.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build and push Linux image (zstd)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./docker/${{ env.dockerfile }}
          tags: ${{ env.image }}
          push: true
          provenance: false
          outputs: type=image,push=true,compression=zstd,compression-level=3,force-compression=true,oci-mediatypes=true

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

  linux-vcpkg-build-upload:
    if: ${{ inputs.need_linux_vcpkg_rebuild }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        arch: [ x64, arm64 ]
        os: [ rockylinux8 ] # also available: rockylinux9
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      image: meshlib/meshlib-${{ matrix.os }}-vcpkg-${{ matrix.arch }}:${{ inputs.vcpkg_docker_image_tag }}
      vcpkg_triplet: ${{ matrix.arch }}-linux-meshlib
    steps:
      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: meshlib
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Switch to BuildKit/buildx with zstd layer compression. See the
      # comment in linux-image-build-upload for details.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build and push Linux vcpkg image (zstd)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./docker/${{ matrix.os }}-vcpkgDockerfile
          tags: ${{ env.image }}
          build-args: |
            VCPKG_TRIPLET=${{ env.vcpkg_triplet }}
          push: true
          provenance: false
          outputs: type=image,push=true,compression=zstd,compression-level=3,force-compression=true,oci-mediatypes=true

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

  windows-vcpkg-build-upload:
    if: ${{ inputs.need_windows_vcpkg_rebuild }}
    timeout-minutes: 240
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ windows-2025 ]
        include:
          - runner: windows-2025
            vcpkg-version: ${{ inputs.vs22_vcpkg_version }}
    steps:
      - name: Setup vcpkg
        working-directory: C:\vcpkg
        run: |
          git fetch
          git checkout ${{ matrix.vcpkg-version }}
          bootstrap-vcpkg.bat
          vcpkg.exe integrate install

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@4ce2bbcf5d401e557e0537d863a6aced08605794 # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and cache vcpkg
        run: .\thirdparty\install.bat --write-s3
