name: Install MSYS2 for MRBind
description: >
  Install the MRBind clang64 toolchain into the runner's preinstalled
  MSYS2. Uses `pacman -S --needed` against current MSYS2 mirrors —
  no version pinning, no GitHub Actions cache. Picks up whatever
  clang/libc++/cmake/etc. is current.

runs:
  using: composite
  steps:
    - name: Install MRBind toolchain (latest from MSYS2)
      # Minimal set — pacman resolves transitive deps. `--needed` skips
      # packages already at >= the available version (runner image
      # ships some clang64 prereqs preinstalled, e.g. libwinpthread).
      # No cache step here on purpose: each run fetches the latest from
      # the MSYS2 mirror so cache-key drift can't collide with master's
      # clang-18-pinned cache.
      shell: pwsh
      run: |
        C:\msys64\msys2_shell.cmd -no-start -defterm -here -c "set -e && pacman -Sy --noconfirm && pacman -S --noconfirm --needed make mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-lld mingw-w64-clang-x86_64-libc++ mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-ninja mingw-w64-clang-x86_64-gettext-tools"
