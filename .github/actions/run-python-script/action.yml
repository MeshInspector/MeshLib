name: Run python script (cross-platform)
description: |
  Runs a python script directly as the step's shell — 'py -3' on Windows,
  'python3' elsewhere — so callers don't repeat the OS ternary. Outputs the
  script writes to $GITHUB_OUTPUT are forwarded under the names listed
  below; add new entries here when a new script needs them.

inputs:
  script:
    required: true
    type: string
    description: Script filename, relative to working-directory.
  working-directory:
    required: true
    type: string
    description: Directory containing the script.

outputs:
  job_id:
    value: ${{ steps.run.outputs.job_id }}
  cpu_count:
    value: ${{ steps.run.outputs.cpu_count }}
  ram_amount_mb:
    value: ${{ steps.run.outputs.ram_amount_mb }}

runs:
  using: composite
  steps:
    - id: run
      # `{{0}}` escapes to the literal `{0}` placeholder that GitHub Actions
      # replaces with the temp script path when invoking the shell.
      shell: ${{ runner.os == 'Windows' && format('py -3 {0} {{0}}', inputs.script) || format('python3 {0} {{0}}', inputs.script) }}
      working-directory: ${{ inputs.working-directory }}
      run: ""
