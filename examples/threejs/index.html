<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MeshLib &times; Three.js</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #1a1c20; color: #e7e9ee; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    #panel {
      position: fixed; top: 12px; left: 12px; z-index: 10; width: 248px;
      background: rgba(28,30,36,.92); border: 1px solid #3a3f4b; border-radius: 10px;
      padding: 14px 16px; backdrop-filter: blur(6px); font-size: 13px; line-height: 1.5;
    }
    #panel h1 { font-size: 14px; margin: 0 0 10px; font-weight: 650; }
    #panel label { display: block; margin: 10px 0 4px; color: #aeb4c2; font-size: 12px; }
    select, input[type=range], button {
      width: 100%; box-sizing: border-box; background: #23262e; color: #e7e9ee;
      border: 1px solid #3a3f4b; border-radius: 6px; padding: 6px 8px; font: inherit;
    }
    button { cursor: pointer; margin-top: 12px; background: #2f6df0; border-color: #2f6df0; font-weight: 600; }
    button:hover { background: #3b78f5; }
    button:disabled { opacity: .5; cursor: default; }
    #stats { margin-top: 12px; font-size: 12px; color: #aeb4c2; white-space: pre-line; }
    #err { color: #ff8d8d; margin-top: 8px; font-size: 12px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="panel">
    <h1>MeshLib &times; Three.js</h1>
    <div>A box and a sphere, combined by MeshLib's CSG kernel and simplified with its
      decimator &mdash; all in WebAssembly, rendered by Three.js.</div>

    <label for="op">Boolean operation</label>
    <select id="op">
      <option value="Union" selected>Union (A &cup; B)</option>
      <option value="Intersection">Intersection (A &cap; B)</option>
      <option value="DifferenceAB">Difference (A &minus; B)</option>
      <option value="DifferenceBA">Difference (B &minus; A)</option>
    </select>

    <label for="ratio">Keep <span id="ratioVal">100</span>% of triangles</label>
    <input id="ratio" type="range" min="5" max="100" value="100" step="5" />

    <button id="run">Recompute</button>
    <div id="stats"></div>
    <div id="err"></div>
  </div>
  <div id="app"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';
    import createMeshLib from './meshlib.mjs';
    import { meshFromThree, meshToThree } from './meshlib-three.js';

    const statsEl = document.getElementById( 'stats' );
    const errEl = document.getElementById( 'err' );

    const app = document.getElementById( 'app' );
    const renderer = new THREE.WebGLRenderer( { antialias: true } );
    renderer.setPixelRatio( devicePixelRatio );
    renderer.setSize( innerWidth, innerHeight );
    app.appendChild( renderer.domElement );

    const scene = new THREE.Scene();
    scene.background = new THREE.Color( 0x1a1c20 );

    const camera = new THREE.PerspectiveCamera( 45, innerWidth / innerHeight, 0.1, 100 );
    camera.position.set( 3.2, 2.4, 3.6 );

    const controls = new OrbitControls( camera, renderer.domElement );
    controls.enableDamping = true;

    scene.add( new THREE.HemisphereLight( 0xffffff, 0x39404d, 1.15 ) );
    const key = new THREE.DirectionalLight( 0xffffff, 1.4 );
    key.position.set( 4, 6, 3 );
    scene.add( key );

    const material = new THREE.MeshStandardMaterial( { color: 0x5b9bd5, metalness: 0.1, roughness: 0.55 } );
    let resultMesh = null;

    addEventListener( 'resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize( innerWidth, innerHeight );
    } );

    ( function loop() {
      requestAnimationFrame( loop );
      controls.update();
      renderer.render( scene, camera );
    } )();

    const ml = await createMeshLib();

    const boxGeom = new THREE.BoxGeometry( 1.6, 1.6, 1.6, 6, 6, 6 );
    const sphereGeom = new THREE.SphereGeometry( 1.05, 48, 32 );
    sphereGeom.translate( 0.7, 0.7, 0.7 );

    function recompute() {
      errEl.textContent = '';
      const op = document.getElementById( 'op' ).value;
      const ratio = Number( document.getElementById( 'ratio' ).value ) / 100;

      const a = meshFromThree( ml, THREE, boxGeom, { mergeVertices } );
      const b = meshFromThree( ml, THREE, sphereGeom, { mergeVertices } );
      const res = ml.boolean( a, b, ml.BooleanOperation[op] );
      if ( !res.valid() ) {
        errEl.textContent = 'boolean failed: ' + res.errorString;
        a.delete(); b.delete(); res.delete();
        return;
      }
      const out = res.mesh;

      out.pack();
      const outTopology = out.topology;
      const outTris = outTopology.getTriangulation();
      const trisAfterBool = outTris.toArray().length / 3;
      outTopology.delete();
      outTris.delete();
      let decimated = { facesDeleted: 0 };
      if ( ratio < 1 ) {
        const s = new ml.DecimateSettings();
        s.maxDeletedFaces = Math.floor( trisAfterBool * ( 1 - ratio ) );
        decimated = ml.decimateMesh( out, s );
        s.delete();
      }

      const geom = meshToThree( ml, THREE, out, { normals: true } );
      a.delete(); b.delete(); res.delete(); out.delete();

      if ( resultMesh ) {
        scene.remove( resultMesh );
        resultMesh.geometry.dispose();
      }
      resultMesh = new THREE.Mesh( geom, material );
      scene.add( resultMesh );

      const finalTris = geom.index.count / 3;
      statsEl.textContent =
        `boolean result: ${trisAfterBool.toLocaleString()} triangles\n` +
        `after decimate: ${finalTris.toLocaleString()} triangles ` +
        `(removed ${decimated.facesDeleted.toLocaleString()})`;
    }

    document.getElementById( 'ratio' ).addEventListener( 'input', ( e ) => {
      document.getElementById( 'ratioVal' ).textContent = e.target.value;
    } );
    document.getElementById( 'run' ).addEventListener( 'click', recompute );

    recompute();
  </script>
</body>
</html>
