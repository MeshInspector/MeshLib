name: Build and test Emscripten

on:
  workflow_call:
    inputs:
      docker_image_tag:
        required: true
        type: string
      internal_build:
        required: false
        type: boolean
      upload_artifacts:
        required: true
        type: boolean
      mrbind_c:
        default: true
        required: false
        type: boolean
      nuget_build_patch:
        default: false
        required: false
        type: boolean

jobs:
  emscripten-build:
    timeout-minutes: 40
    runs-on: ubuntu-24.04-arm
    container:
      image: meshlib/meshlib-emscripten-arm64:${{ inputs.docker_image_tag }}
    strategy:
      fail-fast: false
      matrix:
        config: [Singlethreaded, Multithreaded, Multithreaded-64Bit]
        include:
          - config: Singlethreaded
            target_name: emscripten-singlethreaded
            package_name: emscripten-singlethreaded
            thirdparty-dir: emscripten-single
            aws-dir: RMISingle
          - config: Multithreaded
            target_name: emscripten
            package_name: emscripten-multithreaded
            thirdparty-dir: emscripten
            aws-dir: RMI
          - config: Multithreaded-64Bit
            target_name: emscripten-wasm64
            package_name: emscripten-multithreaded-64bit
            thirdparty-dir: emscripten-wasm64
            aws-dir: RMI64

    steps:
      - name: Work-around possible permission issues
        shell: bash
        run: |
          # NOTE: {GITHUB_WORKSPACE} != {{ github.workspace }}
          # Related issue: https://github.com/actions/runner/issues/2058
          if test -d $GITHUB_WORKSPACE && test -n "$(find ${GITHUB_WORKSPACE} -user root)" ; then
            mv ${GITHUB_WORKSPACE} ${GITHUB_WORKSPACE}_${RANDOM}
            mkdir ${GITHUB_WORKSPACE}
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Get AWS instance type
        uses: ./.github/actions/get-aws-instance-type

      - name: Collect runner's system stats
        if: ${{ inputs.internal_build }}
        id: collect-runner-stats
        continue-on-error: true
        uses: ./.github/actions/collect-runner-stats
        with:
          target_os: ${{ matrix.target_name }}
          target_arch: wasm
          cxx_compiler: emcc
          build_config: Release
          aws_instance_type: ${{ env.AWS_INSTANCE_TYPE }}

      - name: Checkout third-party submodules
        run: |
          # have to checkout selective submodules by our own
          # related issue: https://github.com/actions/checkout/issues/1779
          export HOME=${RUNNER_TEMP}
          git config --global --add safe.directory ${GITHUB_WORKSPACE}
          # Retried via retry.sh: submodule endpoints occasionally 500.
          bash scripts/retry.sh -- git submodule update --init --depth 1 \
            thirdparty/imgui \
            thirdparty/parallel-hashmap \
            thirdparty/mrbind-pybind11 \
            thirdparty/mrbind
          # mrbind needs deps/cppdecl; recurse only there
          bash scripts/retry.sh -- git -C thirdparty/mrbind submodule update --init --depth 1 deps/cppdecl

      - name: Install thirdparty libs
        run: |
          ln -s /usr/local/lib/${{ matrix.thirdparty-dir }}/include ./include
          ln -s /usr/local/lib/${{ matrix.thirdparty-dir }}/lib ./lib
          ln -s /usr/local/lib/${{ matrix.thirdparty-dir }}/share ./share

      - name: Download C bindings
        if: ${{ inputs.mrbind_c }}
        uses: actions/download-artifact@v8
        with:
          name: CBindings
          path: MeshLib/CbindingsTmp

      - name: Prepare C bindings folders
        if: ${{ inputs.mrbind_c }}
        run: |
          rm -rf source/MeshLibC2
          mv MeshLib/CbindingsTmp/MeshLibC2 source
          # Cuda placeholders:
          cp -R scripts/mrbind/cuda_placeholder_generated_c/{include,src} source/MeshLibC2Cuda

      - name: Build
        env:
          MR_EMSCRIPTEN: "ON"
          MESHLIB_BUILD_RELEASE: "ON"
          MESHLIB_BUILD_DEBUG: "OFF"
          MR_EMSCRIPTEN_SINGLE: ${{ fromJSON('["OFF", "ON"]')[matrix.config == 'Singlethreaded'] }}
          MR_EMSCRIPTEN_WASM64: ${{ fromJSON('["OFF", "ON"]')[matrix.config == 'Multithreaded-64Bit'] }}
          # options to be passed to cmake
          MR_CMAKE_OPTIONS: >
            -DMR_CXX_STANDARD=23
            -DMR_PCH_USE_EXTRA_HEADERS=ON
            -DMESHLIB_BUILD_GENERATED_C_BINDINGS=${{ fromJSON('["OFF", "ON"]')[inputs.mrbind_c] }}
        run: ./scripts/build_source.sh

      - name: Stage MRTest bundle
        run: |
          mkdir mrtest-bundle
          cp build/Release/bin/MRTest* /emsdk/upstream/emscripten/emrun.py mrtest-bundle/

      - name: Upload MRTest bundle
        uses: actions/upload-artifact@v7
        with:
          name: MRTest_${{ matrix.package_name }}
          path: mrtest-bundle
          retention-days: 1

      - name: Create Package
        run: |
          cp -a /usr/local/lib/${{ matrix.thirdparty-dir }} ./meshlib_install
          ./scripts/cmake_install.sh ./meshlib_install
          ( cd ./meshlib_install ; zip -r ../meshlib_${{ matrix.package_name }} * )

      - name: Build C++ examples
        run: |
          emcmake cmake \
            -S examples/cpp-examples \
            -B cpp-examples-build \
            -D CMAKE_FIND_ROOT_PATH=$(pwd)/meshlib_install/ \
            ${{ matrix.target_name == 'emscripten-wasm64' && '-D CMAKE_C_FLAGS="-sMEMORY64=1" -D CMAKE_CXX_FLAGS="-sMEMORY64=1"' || '' }}
          cmake \
            --build cpp-examples-build \
            --parallel $(nproc)

      - name: Upload Package
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: Distributives_${{ matrix.package_name }}
          path: meshlib_${{ matrix.package_name }}.zip
          retention-days: 1

      - name: Prepare C bindings for NuGet
        if: ${{ inputs.nuget_build_patch && matrix.compiler == 'Clang 21' && matrix.config == 'Release' }}
        shell: bash
        run: |
          mkdir nuget_files
          cp build/Release/bin/*.a nuget_files
          cp lib/*.a nuget_files

      - name: Upload NuGet files to Artifacts
        if: ${{ inputs.nuget_build_patch && matrix.config == 'Release' }}
        uses: actions/upload-artifact@v7
        with:
          name: DotNetPatchArchiveWasm
          path: ./nuget_files/*
          retention-days: 1
          overwrite: true

      - name: Collect artifact stats
        if: ${{ inputs.internal_build && inputs.upload_artifacts }}
        continue-on-error: true
        uses: ./.github/actions/collect-artifact-stats
        with:
          artifact_path: ${{ github.workspace }}
          artifact_glob: meshlib_${{ matrix.package_name }}.zip
          stats_file_suffix: -${{ steps.collect-runner-stats.outputs.job_id }}

  emscripten-test:
    needs: emscripten-build
    timeout-minutes: 10
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        package_name:
          - emscripten-singlethreaded
          - emscripten-multithreaded
          - emscripten-multithreaded-64bit

    steps:
      - name: Download MRTest bundle
        uses: actions/download-artifact@v8
        with:
          name: MRTest_${{ matrix.package_name }}
          path: mrtest-bundle

      - name: Unit Tests
        timeout-minutes: 5
        working-directory: mrtest-bundle
        run: |
          python3 emrun.py \
            --browser=/usr/bin/firefox \
            --browser-args="--headless" \
            --safe-firefox-profile \
            --kill-exit \
            ./MRTest.html
