name: Prepare images

on:
  workflow_call:
    inputs:
      docker_image_tag:
        required: true
        type: string
      need_linux_image_rebuild:
        required: true
        type: boolean
      need_linux_vcpkg_rebuild:
        required: true
        type: boolean
      need_windows_vcpkg_rebuild:
        required: true
        type: boolean
      vcpkg_docker_image_tag:
        required: true
        type: string
      vcpkg_version:
        required: true
        type: string
      # `disable-build-<platform>` PR labels (resolved upstream in
      # config.yml) — skip the matching image build cells / jobs so we
      # don't burn runner time producing images no consumer will use.
      disable_ubuntu_x64:
        type: boolean
        default: false
      disable_ubuntu_arm64:
        type: boolean
        default: false
      disable_emscripten:
        type: boolean
        default: false
      disable_linux_vcpkg:
        type: boolean
        default: false
      disable_windows:
        type: boolean
        default: false

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  always-success:
    runs-on: ubuntu-latest
    steps:
      - name: Do nothing
        run: echo

  # Read the image inventory from matrix/docker-images.json (shared with
  # scripts/devops/select_docker_image_tags.sh) and build the job matrices,
  # dropping linux cells the PR opted out of via `disable-build-<platform>`
  # labels. The `matrix` context is not available in job-level `if:` for
  # reusable workflow inputs, so per-cell skipping must happen here.
  # `emscripten-generate-c-bindings` (the image for generate-c-bindings) has no
  # disable condition: that job always runs, so the image is always built.
  compute-image-matrices:
    if: ${{ inputs.need_linux_image_rebuild || inputs.need_linux_vcpkg_rebuild }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      empty:  ${{ steps.compute.outputs.empty }}
      cbindings_axis:    ${{ steps.compute.outputs.cbindings_axis }}
      cbindings_include: ${{ steps.compute.outputs.cbindings_include }}
      vcpkg_arch_axis: ${{ steps.compute.outputs.vcpkg_arch_axis }}
      vcpkg_os_axis:   ${{ steps.compute.outputs.vcpkg_os_axis }}
      vcpkg_include:   ${{ steps.compute.outputs.vcpkg_include }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          sparse-checkout: .github/workflows/matrix

      - id: compute
        env:
          DISABLE_UBUNTU_X64:   ${{ inputs.disable_ubuntu_x64 }}
          DISABLE_UBUNTU_ARM64: ${{ inputs.disable_ubuntu_arm64 }}
          DISABLE_EMSCRIPTEN:   ${{ inputs.disable_emscripten }}
        run: |
          FILE=.github/workflows/matrix/docker-images.json
          # Cells encode only `distro` and `arch` so the auto-generated cell
          # name stays "(<distro>, <arch>)"; the runner OS and image suffix
          # are derived from `matrix.arch` inline below.
          MATRIX=$(jq -c \
            --argjson dx64   "$DISABLE_UBUNTU_X64" \
            --argjson darm64 "$DISABLE_UBUNTU_ARM64" \
            --argjson demscr "$DISABLE_EMSCRIPTEN" \
            '.linux | map(select(
              (((.distro|startswith("ubuntu")) and (.arch=="x64"  ) and $dx64  ) | not)
              and (((.distro|startswith("ubuntu")) and (.arch=="arm64") and $darm64) | not)
              and (((.distro=="emscripten")                              and $demscr) | not)
             ))' "$FILE")
          echo "matrix=${MATRIX}"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          if [[ "${MATRIX}" == "[]" ]]; then
            echo "empty=true"  >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "cbindings_axis=$(jq -c '[."emscripten-c-bindings"[].emsdk_image]' "$FILE")"
            echo "cbindings_include=$(jq -c '."emscripten-c-bindings"' "$FILE")"
            echo "vcpkg_arch_axis=$(jq -c '[."linux-vcpkg"[].arch] | unique' "$FILE")"
            echo "vcpkg_os_axis=$(jq -c '[."linux-vcpkg"[].os] | unique' "$FILE")"
            echo "vcpkg_include=$(jq -c '[."linux-vcpkg"[] | {arch, runner}]' "$FILE")"
          } >> "$GITHUB_OUTPUT"

  linux-image-build-upload:
    needs: compute-image-matrices
    if: ${{ needs.compute-image-matrices.outputs.empty == 'false' && inputs.need_linux_image_rebuild }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.compute-image-matrices.outputs.matrix) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    env:
      dockerfile: ${{ matrix.distro }}Dockerfile
      image: meshlib/meshlib-${{ matrix.distro }}${{ matrix.arch == 'arm64' && '-arm64' || '' }}:${{ inputs.docker_image_tag }}
    steps:
      - name: Work-around possible permission issues
        shell: bash
        run: |
          # NOTE: {GITHUB_WORKSPACE} != {{ github.workspace }}
          # Related issue: https://github.com/actions/runner/issues/2058
          if test -d $GITHUB_WORKSPACE && test -n "$(find ${GITHUB_WORKSPACE} -user root)" ; then
            mv ${GITHUB_WORKSPACE} ${GITHUB_WORKSPACE}_${RANDOM}
            mkdir ${GITHUB_WORKSPACE}
          fi

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

      - name: Work-around possible permission issues
        shell: bash
        run: |
          # NOTE: {GITHUB_WORKSPACE} != {{ github.workspace }}
          # Related issue: https://github.com/actions/runner/issues/2058
          if test -d $GITHUB_WORKSPACE && test -n "$(find ${GITHUB_WORKSPACE} -user root)" ; then
            mv ${GITHUB_WORKSPACE} ${GITHUB_WORKSPACE}_${RANDOM}
            mkdir ${GITHUB_WORKSPACE}
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: meshlib
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the image only if its content-addressed tag isn't already in the
      # registry (reused as-is across PR commits and after merge), then point
      # the conventional tag (latest on master, branch-name on a PR) at it so
      # the build-test jobs pull it unchanged.
      - name: Build, push and tag Linux image
        run: |
          repo="${image%:*}"
          tag=$(scripts/devops/docker_image_source_checksum.sh "${{ matrix.distro }}")
          if scripts/docker_image_exists.sh "${repo}:${tag}"; then
            echo "Reusing existing ${repo}:${tag}"
          else
            docker build -f ./docker/${{ env.dockerfile }} -t "${repo}:${tag}" . --progress=plain
            docker push "${repo}:${tag}"
          fi
          docker buildx imagetools create -t "${image}" "${repo}:${tag}"

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

  linux-vcpkg-build-upload:
    needs: compute-image-matrices
    if: ${{ inputs.need_linux_vcpkg_rebuild && !inputs.disable_linux_vcpkg }}
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.compute-image-matrices.outputs.vcpkg_arch_axis) }}
        os:   ${{ fromJSON(needs.compute-image-matrices.outputs.vcpkg_os_axis) }}
        include: ${{ fromJSON(needs.compute-image-matrices.outputs.vcpkg_include) }}
    runs-on: ${{ matrix.runner }}
    env:
      image: meshlib/meshlib-${{ matrix.os }}-vcpkg-${{ matrix.arch }}:${{ inputs.vcpkg_docker_image_tag }}
      vcpkg_triplet: ${{ matrix.arch }}-linux-meshlib
    steps:
      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: meshlib
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::259351611210:role/GitHubMeshLibAwsCredsRole
          role-duration-seconds: 7200
          retry-max-attempts: 5

      # Build the image only if its content-addressed tag isn't already in the
      # registry (reused across PR commits and after merge), then point the
      # conventional tag (latest on master, branch-name on a PR) at it so the
      # build-test jobs pull it unchanged.
      - name: Build, push and tag Linux vcpkg image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          repo="${image%:*}"
          tag=$(scripts/devops/docker_image_source_checksum.sh ${{ matrix.os }}-vcpkg)
          if scripts/docker_image_exists.sh "${repo}:${tag}"; then
            echo "Reusing existing ${repo}:${tag}"
          else
            docker build \
              -f ./docker/${{ matrix.os }}-vcpkgDockerfile \
              -t "${repo}:${tag}" \
              --build-arg VCPKG_TRIPLET=${{ env.vcpkg_triplet }} \
              --secret id=AWS_ACCESS_KEY_ID \
              --secret id=AWS_SECRET_ACCESS_KEY \
              --secret id=AWS_SESSION_TOKEN \
              . --progress=plain
            docker push "${repo}:${tag}"
          fi
          docker buildx imagetools create -t "${image}" "${repo}:${tag}"

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

  linux-emscripten-c-bindings-build-upload:
    needs: compute-image-matrices
    if: ${{ inputs.need_linux_image_rebuild && !inputs.disable_emscripten }}
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # The old `3.1.38` didn't have ARM images.
        emsdk_image: ${{ fromJSON(needs.compute-image-matrices.outputs.cbindings_axis) }}
        include: ${{ fromJSON(needs.compute-image-matrices.outputs.cbindings_include) }}
    runs-on: ${{matrix.runner_image}}
    env:
      image: meshlib/meshlib-emscripten-build-c-bindings-${{matrix.emsdk_image}}:${{inputs.docker_image_tag}}
    steps:
      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: meshlib
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::259351611210:role/GitHubMeshLibAwsCredsRole
          role-duration-seconds: 7200
          retry-max-attempts: 5

      # Build the image only if its content-addressed tag isn't already in the
      # registry (reused across PR commits and after merge), then point the
      # conventional tag (latest on master, branch-name on a PR) at it so the
      # build-test jobs pull it unchanged.
      - name: Build, push and tag Linux vcpkg image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          repo="${image%:*}"
          tag=$(scripts/devops/docker_image_source_checksum.sh emscripten-build-c-bindings)
          if scripts/docker_image_exists.sh "${repo}:${tag}"; then
            echo "Reusing existing ${repo}:${tag}"
          else
            docker build \
              -f docker/emscripten-build-c-bindingsDockerfile \
              -t "${repo}:${tag}" \
              --build-arg BASE_EMSDK_IMAGE=${{matrix.emsdk_image}} \
              --secret id=AWS_ACCESS_KEY_ID \
              --secret id=AWS_SECRET_ACCESS_KEY \
              --secret id=AWS_SESSION_TOKEN \
              . --progress=plain
            docker push "${repo}:${tag}"
          fi
          docker buildx imagetools create -t "${image}" "${repo}:${tag}"

      - name: Remove unused Docker data
        run: docker system prune --force --all --volumes

  windows-vcpkg-build-upload:
    if: ${{ inputs.need_windows_vcpkg_rebuild && !inputs.disable_windows }}
    timeout-minutes: 240
    runs-on: ${{ matrix.runner }}
    # install.bat (run inside the setup-vcpkg-windows action) picks the triplet
    # from VCPKG_DEFAULT_TRIPLET; set it at the job level so it propagates into
    # the composite action's steps (a step-level `env:` would not).
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet || 'x64-windows-meshlib' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - vs: vs2026
            runner: windows-2025
            vcpkg_triplet: x64-windows-meshlib
          - vs: vs2022
            runner: windows-2025
            vcpkg_triplet: x64-windows-vs2022-meshlib
          - vs: vs2019
            runner: windows-2022
            vcpkg_triplet: x64-windows-vs2019-meshlib
          - vs: vs2019
            runner: windows-2022
            vcpkg_triplet: x64-windows-meshlib-iterator-debug
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          retry-max-attempts: 5

      - name: Build and cache vcpkg
        uses: ./.github/actions/setup-vcpkg-windows
        with:
          vcpkg-version: ${{ inputs.vcpkg_version }}
          vcpkg-triplet: ${{ matrix.vcpkg_triplet || 'x64-windows-meshlib' }}
          install-flags: '--write-s3'
