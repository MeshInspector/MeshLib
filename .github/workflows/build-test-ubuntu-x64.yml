name: Build and test Ubuntu x64

on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string
      config_matrix:
        required: true
        type: string
      docker_image_tag:
        required: true
        type: string
      full_config_build:
        default: false
        required: false
        type: boolean
      internal_build:
        required: false
        type: boolean
      upload_artifacts:
        required: true
        type: boolean
      upload_test_artifacts:
        required: true
        type: boolean
      mrbind:
        default: true
        required: false
        type: boolean
      mrbind_c:
        default: true
        required: false
        type: boolean

jobs:
  ubuntu-x64-build-test:
    timeout-minutes: 60
    runs-on: [ubuntu-latest]
    container:
      image: meshlib/meshlib-${{matrix.os}}:${{inputs.docker_image_tag}}
      options: --user root
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON( inputs.config_matrix ) }}
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read  # This is required for actions/checkout
      actions: read   # This is required for wait-for-job

    steps:
      - name: Display job info
        run: echo "Building on ${{ matrix.os }} with ${{ matrix.compiler }} in ${{ matrix.config }} mode"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Collect runner's system stats
        if: ${{ inputs.internal_build }}
        id: collect-runner-stats
        continue-on-error: true
        uses: ./.github/actions/collect-runner-stats
        with:
          target_os: ${{ matrix.os }}
          target_arch: x64
          cxx_compiler: ${{ matrix.cxx-compiler }}
          build_config: ${{ matrix.config }}

      - name: Checkout third-party submodules
        run: |
          # have to checkout selective submodules by our own
          # related issue: https://github.com/actions/checkout/issues/1779
          export HOME=${RUNNER_TEMP}
          git config --global --add safe.directory '*'
          # Retried via retry.sh: submodule endpoints occasionally 500.
          bash scripts/retry.sh -- git submodule update --init --depth 1 \
            thirdparty/imgui \
            thirdparty/eigen \
            thirdparty/parallel-hashmap \
            thirdparty/mrbind-pybind11 \
            thirdparty/mrbind
          # mrbind needs deps/cppdecl; recurse only there
          bash scripts/retry.sh -- git -C thirdparty/mrbind submodule update --init --depth 1 deps/cppdecl

      - name: Install thirdparty libs
        run: |
          ln -s /usr/local/lib/meshlib-thirdparty-lib/lib ./lib
          ln -s /usr/local/lib/meshlib-thirdparty-lib/include ./include
          ln -s /usr/local/lib/meshlib-thirdparty-lib/share ./share

      - name: Install MRBind
        if: ${{ inputs.mrbind || inputs.mrbind_c }}
        uses: ./.github/actions/build-mrbind
        with:
          # The Dockerfile hash in extra-cache-key busts the cache whenever the
          # toolchain inside the image changes (e.g. glibc, clang upgrade).
          cache-key-prefix: ubuntu-x64-${{ matrix.os }}
          build-script: scripts/mrbind/install_mrbind_ubuntu.sh
          extra-cache-key: ${{ hashFiles('scripts/mrbind/clang_version.txt', format('docker/{0}Dockerfile', matrix.os)) }}

      - name: Create virtualenv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python3 -m ensurepip --upgrade
          python3 -m pip install --upgrade pip
          echo PATH=$PATH >> $GITHUB_ENV

      - name: Setup python requirements
        run: python3 -m pip install -r ./requirements/python/requirements.txt

      - name: Wait for C bindings
        if: ${{ inputs.mrbind_c }}
        uses: ./.github/actions/wait-for-job
        with:
          job-name: generate-c-bindings

      - name: Download C bindings
        if: ${{ inputs.mrbind_c }}
        uses: actions/download-artifact@v8
        with:
          name: CBindings
          path: MeshLib/CbindingsTmp

      - name: Prepare C bindings folders
        if: ${{ inputs.mrbind_c }}
        shell: bash
        run: |
          rm -rf source/MeshLibC2
          mv MeshLib/CbindingsTmp/MeshLibC2 source
          if [[ $${matrix.build_mrcuda} == ON ]]; then
            rm -rf source/MeshLibC2Cuda
            mv MeshLib/CbindingsTmp/MeshLibC2Cuda source
          else
            cp -r scripts/mrbind/cuda_placeholder_generated_c/{include,src} source/MeshLibC2Cuda
          fi

      - name: Build
        run: ./scripts/build_source.sh
        env:
          MESHLIB_BUILD_RELEASE: ${{ fromJSON('["OFF", "ON"]')[matrix.config == 'Release'] }}
          MESHLIB_BUILD_DEBUG: ${{ fromJSON('["OFF", "ON"]')[matrix.config == 'Debug'] }}
          CMAKE_C_COMPILER: ${{ matrix.c-compiler }}
          CMAKE_CXX_COMPILER: ${{ matrix.cxx-compiler }}
          MR_VERSION: ${{ inputs.app_version }}
          # options to be passed to cmake
          MR_CMAKE_OPTIONS: >
            -DMR_CXX_STANDARD=${{ matrix.cxx-standard }}
            -DMESHLIB_BUILD_MRCUDA=${{ matrix.build_mrcuda }}
            -DMR_PCH_USE_EXTRA_HEADERS=ON
            -DMESHLIB_BUILD_MRMESH_PY_LEGACY=${{ fromJSON('["ON", "OFF"]')[inputs.mrbind] }}
            -DMESHLIB_BUILD_GENERATED_C_BINDINGS=${{ fromJSON('["OFF", "ON"]')[inputs.mrbind_c] }}
            -DMRVIEWER_NO_XDG_DESKTOP_PORTAL=ON

      - name: PCH size (diagnostic)
        run: find ./build/${{ matrix.config }} -name 'cmake_pch.hxx.gch' -exec ls -lh {} +

      - name: MRMesh Exported Symbols
        run: objdump -T ./build/${{ matrix.config }}/bin/libMRMesh.so | c++filt

      - name: Generate and build Python bindings
        if: ${{ inputs.mrbind }}
        env:
          CXX: ${{ matrix.cxx-compiler }}
          ENABLE_CUDA: ${{ fromJSON('{"ON":1, "OFF":0}') [matrix.build_mrcuda] }}
          # `-fpch-codegen` hits clang defect llvm/llvm-project#203691 on libstdc++-12 (a `<filesystem>`
          # internal homed into the PCH object but never emitted, surfaces at import time). Disable on ubuntu22.
          PCH_CODEGEN: ${{ matrix.os == 'ubuntu22' && '0' || '1' }}
        run: make -f scripts/mrbind/generate.mk MODE=none -B --trace MESHLIB_SHLIB_DIR=build/${{matrix.config}}/bin ENABLE_CUDA=${{env.ENABLE_CUDA}} PCH_CODEGEN=${{env.PCH_CODEGEN}}

      - name: Collect Timings
        run: ./scripts/devops/collect_timing_logs.sh ${{matrix.os}} ${{matrix.config}} "${{matrix.cxx-compiler}}"

      #Save timing in artifact
      - name: Upload Timings
        uses: actions/upload-artifact@v7
        with:
          name: Timing_Logs_${{matrix.os}}-x86_${{matrix.config}}_${{matrix.cxx-compiler}}
          path: time_log/

      - name: Run Start-and-Exit Tests
        timeout-minutes: 3
        run: xvfb-run -a ./build/${{ matrix.config }}/bin/MeshViewer -hidden -noEventLoop -unloadPluginsAtEnd

      - name: Verify meshlib.mrmeshpy import
        if: ${{ inputs.mrbind }}
        timeout-minutes: 3
        uses: ./.github/actions/verify-meshlib-python-import
        with:
          build-bin-dir: ./build/${{ matrix.config }}/bin

      - name: Unit Tests
        env:
          GTEST_OUTPUT: 'xml:unit_tests_report_gtest.xml'
        timeout-minutes: 10
        run: ./build/${{ matrix.config }}/bin/MRTest

      - name: C Unit Tests
        if: ${{ inputs.mrbind_c }}
        timeout-minutes: 10
        run: ./build/${{ matrix.config }}/bin/MRTestC2

      - name: Python Sanity Tests
        if: ${{ inputs.mrbind }}
        timeout-minutes: 8
        working-directory: ./build/${{ matrix.config }}/bin
        run: python3 -u ./../../../scripts/run_python_test_script.py -d '../test_python' -a ' --junit-xml=../unit_tests_report_pytest.xml'

      - name: Python Regression Tests
        if: ${{ inputs.internal_build && inputs.mrbind }}
        env:
          RUN_CUDA_ARG: "--run-cuda=negative --junit-xml=../unit_tests_report_regression.xml"
        uses: ./.github/actions/python-regression-tests
        with:
          build_config: ${{ matrix.config }}
          pytest_args: ${{ env.RUN_CUDA_ARG }}
          smoke: ${{ !inputs.full_config_build && matrix.config == 'Debug' }}
          test_artifacts_path: ${{ matrix.os }}/${{matrix.config}}/${{matrix.compiler}}
          upload_test_artifacts: ${{ inputs.upload_test_artifacts }}

      - name: Generate Test Performance Report
        continue-on-error: true
        run: |
          scripts/junit_to_csv.py unit_tests_report.csv unit_tests_report_*.xml
          cat unit_tests_report.csv

      - name: Create Deb
        if: ${{ matrix.compiler == 'GCC' && matrix.config == 'Release' }}
        env:
          MESHLIB_BUILD_RELEASE: "ON"
          MESHLIB_BUILD_DEBUG: "OFF"
        run: |
          ./scripts/distribution.sh ${{inputs.app_version}}
          mv ./distr/meshlib-dev.deb meshlib_${{matrix.os}}-dev.deb

      - name: Extract Deb
        if: ${{ matrix.compiler == 'GCC' && matrix.config == 'Release' }}
        run: dpkg --extract meshlib_${{matrix.os}}-dev.deb $(pwd)/meshlib_install/

      - name: Build C++ examples and samples
        if: ${{ matrix.compiler == 'GCC' && matrix.config == 'Release' }}
        run: |
          cmake \
            -S examples/cpp-examples \
            -B cpp-examples-build \
            -D CMAKE_FIND_ROOT_PATH=$(pwd)/meshlib_install/ \
            -D CMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
          cmake \
            --build cpp-examples-build \
            --parallel $(nproc)
          cmake \
            -S examples/cpp-samples \
            -B cpp-samples-build \
            -D CMAKE_FIND_ROOT_PATH=$(pwd)/meshlib_install/ \
            -D CMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
          cmake \
            --build cpp-samples-build \
            --parallel $(nproc)

      - name: Build C examples
        if: ${{ matrix.compiler == 'GCC' && matrix.config == 'Release' }}
        run: |
          cmake \
            -S examples/c-examples \
            -B c-examples-build \
            -D CMAKE_FIND_ROOT_PATH=$(pwd)/meshlib_install/ \
            -D CMAKE_C_COMPILER=${{ matrix.c-compiler }}
          cmake \
            --build c-examples-build \
            --parallel $(nproc)

      - name: Upload Ubuntu Developer Distribution
        if: ${{ inputs.upload_artifacts && matrix.upload_release == 'ON' && matrix.compiler == 'GCC' && matrix.config == 'Release' }}
        uses: actions/upload-artifact@v7
        with:
          name: Distributives_${{matrix.os}}-x86
          path: meshlib_${{matrix.os}}-dev.deb
          retention-days: 1

      - name: Collect artifact stats
        # Mirror `Upload Ubuntu Developer Distribution`'s gate -- otherwise
        # matrix entries that don't produce a .deb (Debug, Clang, or
        # `upload_release == 'OFF'`) invoke this step with no matching file
        # and the action fails (with `continue-on-error: true` the job still
        # succeeds, but a confusing `failure`-level annotation is surfaced
        # on the run summary).
        if: ${{ inputs.internal_build && inputs.upload_artifacts && matrix.upload_release == 'ON' && matrix.compiler == 'GCC' && matrix.config == 'Release' }}
        continue-on-error: true
        uses: ./.github/actions/collect-artifact-stats
        with:
          artifact_path: ${{ github.workspace }}
          artifact_glob: meshlib_${{matrix.os}}-dev.deb
          stats_file_suffix: -${{ steps.collect-runner-stats.outputs.job_id }}
