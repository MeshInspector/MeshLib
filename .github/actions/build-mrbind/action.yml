name: Build MRBind
description: >
  Build the MRBind tool from the `mrbind` submodule, caching its
  `build/` dir keyed on the submodule SHA, the build script's hash, and
  any extra key passed by the caller (toolchain lockfile, clang version
  file, etc.). On cache hit, the build step is skipped entirely.

inputs:
  cache-key-prefix:
    required: true
    description: >
      Short platform/toolchain identifier (e.g. `windows-clang18`,
      `ubuntu-clang`, `rocky-clang`, `macos-clang`). Determines the
      cache namespace so different platforms don't collide.
  build-script:
    required: true
    description: >
      Path to the build script (relative to the repo root). On Windows
      it must be a `.bat` invoked via `call`; elsewhere a POSIX shell
      script run directly. Hashed into the cache key and executed on
      cache miss.
  mrbind-dir:
    required: false
    default: thirdparty/mrbind
    description: >
      Path to the mrbind submodule relative to the repo root. Override
      when the action is consumed from a repo where MeshLib itself is
      a submodule (e.g. `MeshLib/thirdparty/mrbind`).
  extra-cache-key:
    required: false
    default: ''
    description: >
      Extra string to mix into the cache key (e.g. the output of
      `hashFiles(...)` over a compiler lockfile or `clang_version.txt`).
  strip-binaries:
    required: false
    default: 'true'
    description: >
      Whether to `strip` debug info from the mrbind executables before
      saving them to cache. Default `'true'` -- gives ~5x smaller
      caches at the cost of useful stack traces if mrbind crashes.
      Set to `'false'` on a debugging branch to retain symbols.
  msys2-dir:
    required: false
    default: 'C:\msys64'
    description: >
      Windows-only. Path to the MSYS2 install used by the build script
      and the strip step. Defaults to `C:\msys64` (where
      `install-msys2-mrbind` puts it). Override when MSYS2 is installed
      elsewhere -- e.g. `C:\msys64_meshlib_mrbind` for runners pre-baked
      with the bat script's default layout.

runs:
  using: composite
  steps:
    - name: Get MRBind submodule SHA
      id: mrbind-sha
      shell: python {0}
      env:
        MRBIND_DIR: ${{ inputs.mrbind-dir }}
      run: |
        import os, subprocess
        sha = subprocess.check_output(
            ['git', '-C', os.environ['MRBIND_DIR'], 'rev-parse', 'HEAD'],
            text=True).strip()
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'sha={sha}\n')

    - name: Cache MRBind build
      id: cache
      uses: actions/cache@v5
      with:
        path: ${{ inputs.mrbind-dir }}/build
        key: mrbind-build-${{ inputs.cache-key-prefix }}-${{ steps.mrbind-sha.outputs.sha }}-${{ hashFiles(inputs.build-script) }}-${{ inputs.extra-cache-key }}

    - name: Build MRBind (Windows)
      # `install_mrbind_windows_msys2.bat` defaults MSYS2_DIR to
      # `C:\msys64_meshlib_mrbind` (a separate copy intended for local dev). Override
      # via the `msys2-dir` input to match where MSYS2 actually lives on the runner.
      if: ${{ steps.cache.outputs.cache-hit != 'true' && runner.os == 'Windows' }}
      shell: cmd
      env:
        MSYS2_DIR: ${{ inputs.msys2-dir }}
      run: call ${{ inputs.build-script }}

    - name: Build MRBind (Unix)
      if: ${{ steps.cache.outputs.cache-hit != 'true' && runner.os != 'Windows' }}
      shell: bash
      run: ${{ inputs.build-script }}

    - name: Trim MRBind build dir before cache save
      # Downstream steps only invoke the three executables (mrbind, mrbind_gen_c,
      # mrbind_gen_csharp -- see scripts/mrbind/generate.mk:191-193). Object files,
      # static libs, and CMake/Ninja metadata aren't consumed and would just bloat
      # the cache (the build script wipes `build/` before rebuilding anyway, so we
      # don't need incremental-rebuild state either).
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: python {0}
      env:
        MRBIND_DIR: ${{ inputs.mrbind-dir }}
      run: |
        import os, shutil
        build = os.path.join(os.environ['MRBIND_DIR'], 'build')
        keep = {'mrbind', 'mrbind.exe',
                'mrbind_gen_c', 'mrbind_gen_c.exe',
                'mrbind_gen_csharp', 'mrbind_gen_csharp.exe'}
        for entry in os.listdir(build):
            if entry in keep:
                continue
            path = os.path.join(build, entry)
            (shutil.rmtree if os.path.isdir(path) else os.remove)(path)

    - name: Strip MRBind binaries
      # Strip shrinks the cache ~5x at the cost of useful stack traces from mrbind
      # crashes. Opt out by passing `strip-binaries: 'false'` on a debugging branch;
      # mrbind is built with `RelWithDebInfo + -fstandalone-debug`, so a fresh local
      # build still gives a full-info binary.
      if: ${{ steps.cache.outputs.cache-hit != 'true' && inputs.strip-binaries == 'true' }}
      shell: python {0}
      env:
        MRBIND_DIR: ${{ inputs.mrbind-dir }}
        MSYS2_DIR: ${{ inputs.msys2-dir }}
      run: |
        import os, platform, subprocess
        base = os.path.join(os.environ['MRBIND_DIR'], 'build')
        names = ['mrbind', 'mrbind_gen_c', 'mrbind_gen_csharp']
        system = platform.system()
        if system == 'Darwin':
            # -S drops debug symbols but keeps the dynamic symbol table.
            cmd, ext = ['strip', '-S'], ''
        elif system == 'Windows':
            # MSYS2 clang64's strip; not on PATH on most runners.
            cmd, ext = [os.path.join(os.environ['MSYS2_DIR'], 'clang64', 'bin', 'strip.exe')], '.exe'
        else:
            cmd, ext = ['strip'], ''
        subprocess.check_call(cmd + [os.path.join(base, n + ext) for n in names])
