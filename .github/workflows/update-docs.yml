name: Update MeshLib Documentation site

on:
  workflow_call:
    inputs:
      output_folder:
        required: false
        type: string
        default: "MeshLib"

jobs:
  update-documentation:
    # Serialize concurrent runs that publish to MeshInspector.github.io.
    # Without this, two CI runs that finish near-simultaneously race on
    # `git push` and the loser fails with "[rejected] master -> master
    # (fetch first)". cancel-in-progress: false queues runs so every
    # commit's docs eventually publish.
    concurrency:
      group: meshinspector-github-io-publish
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Install Doxygen
        uses: ssciwr/doxygen-install@329d88f5a303066a5bd006db7516b1925b86350e # v1
        with:
          version: "1.14.0"

      - name: Checkout MeshLib
        uses: actions/checkout@v6
        with:
          path: 'MeshLib/'

      - name: Checkout Doxygen Data
        uses: actions/checkout@v6
        with:
          repository: 'MeshInspector/MeshInspector.github.io'
          path: 'MeshInspector.github.io/'
          token: ${{ secrets.MESHINSPECTOR_BOT_TOKEN }}
          submodules: recursive

      - name: Download Python Stubs
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: PythonStubs
          path: MeshLib/scripts/wheel/meshlib/meshlib

      - name: Download C bindings headers
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: CBindings
          path: MeshLib/CbindingsTmp

      - name: Prepare C bindings folders
        run: |
          mv MeshLib/CbindingsTmp/MeshLibC2 MeshLib/Cbindings
          mv MeshLib/CbindingsTmp/MeshLibC2Cuda MeshLib/CbindingsCuda

      - name: Download C# bindings
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: CsharpBindings
          path: MeshLib/CsharpBindings

      - name: Check for bindings
        id: check_bindings
        run: |
          if [ -d MeshLib/scripts/wheel/meshlib/meshlib ] && [ -d MeshLib/Cbindings ] && [ -d MeshLib/CsharpBindings ] ; then
            echo "all_bindings=true" >> $GITHUB_OUTPUT
          else
            echo "Failed to get Python stub files, aborting"
            echo "all_bindings=false" >> $GITHUB_OUTPUT
          fi

      - name: Build All Documentation
        if: ${{ steps.check_bindings.outputs.all_bindings == 'true' }}
        working-directory: MeshInspector.github.io
        run: scripts/update_doc.sh ${{ inputs.output_folder }} ../MeshLib/scripts/doxygen/Modules.txt

      - name: Commit and push changes
        if: ${{ steps.check_bindings.outputs.all_bindings == 'true' }}
        working-directory: MeshInspector.github.io
        run: |
          git config user.email "${{ secrets.MESHINSPECTOR_BOT_EMAIL }}@gmail.com"
          git config user.name "meshinspector-bot"
          git add -A
          git commit --allow-empty -m "Auto update docs" -a
          git push
